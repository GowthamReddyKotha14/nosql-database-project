name: Autograding Tests
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:
  autograding:
    name: Run Autograding Tests
    runs-on: ubuntu-latest
    outputs:
      results: ${{ steps.autograding_reporter.outputs.results }}

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

      cassandra:
        image: cassandra:4.1
        ports:
          - 9042:9042
        env:
          CASSANDRA_CLUSTER_NAME: TestCluster
          CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
        options: >-
          --health-cmd "cqlsh -e 'describe cluster'"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 60s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: pip install pymongo "cassandra-driver" pytest pytest-json-report

      - name: Verify MongoDB is ready
        run: |
          python - <<'EOF'
          import os
          from pymongo import MongoClient
          import time, sys
          uri = os.environ.get("MONGO_URI", "mongodb://localhost:27017/")
          for i in range(10):
              try:
                  MongoClient(uri, serverSelectionTimeoutMS=3000).admin.command("ping")
                  print("MongoDB ready")
                  sys.exit(0)
              except Exception as e:
                  print(f"Waiting for MongoDB ({i+1}/10)... {e}")
                  time.sleep(5)
          print("MongoDB never became ready")
          sys.exit(1)
          EOF

      - name: Verify Cassandra is ready
        run: |
          python - <<'EOF'
          from cassandra.cluster import Cluster
          import time, sys
          for i in range(20):
              try:
                  cluster = Cluster(["localhost"], connect_timeout=10)
                  session = cluster.connect()
                  session.execute("SELECT release_version FROM system.local")
                  cluster.shutdown()
                  print("Cassandra ready")
                  sys.exit(0)
              except Exception as e:
                  print(f"Waiting for Cassandra ({i+1}/20)... {e}")
                  time.sleep(10)
          print("Cassandra never became ready")
          sys.exit(1)
          EOF

      - name: Load MongoDB — run student commands.js
        run: |
          which mongosh || npm install -g mongosh
          mongosh --quiet "mongodb://localhost:27017/ecommerce" --file mongo/commands.js || true

      - name: Sanity-check MongoDB data load
        run: |
          python - <<'EOF'
          import os
          from pymongo import MongoClient
          db = MongoClient(os.environ.get("MONGO_URI", "mongodb://localhost:27017/"))["ecommerce"]
          required = ["orders", "products", "users", "clicks"]
          counts = {name: db[name].count_documents({}) for name in required}
          print("MongoDB collection counts:", counts)
          if any(counts[name] == 0 for name in required):
              print("WARNING: One or more required MongoDB collections are empty.")
          EOF

      - name: Load Cassandra — run student schema.cql and queries.cql
        run: |
          python - <<'EOF'
          from cassandra.cluster import Cluster
          import re

          def run_cql_file(session, path):
              with open(path) as f:
                  raw = f.read()
              raw = re.sub(r'--[^\n]*', '', raw)
              statements = [s.strip() for s in raw.split(';') if s.strip()]
              errors = 0
              for stmt in statements:
                  try:
                      session.execute(stmt)
                  except Exception as e:
                      print(f"  WARN: {e} — statement: {stmt[:60]}...")
                      errors += 1
              return errors

          cluster = Cluster(["localhost"])
          session = cluster.connect()
          print("Loading cassandra/schema.cql ...")
          print(f"  {run_cql_file(session, 'cassandra/schema.cql')} error(s)")
          print("Loading cassandra/queries.cql ...")
          print(f"  {run_cql_file(session, 'cassandra/queries.cql')} error(s)")
          cluster.shutdown()
          EOF

      # ── Structure / Documentation tests ────────────────────────────────────

      - name: Required files present
        id: test_required_files
        uses: education/autograding-command-grader@v1
        with:
          test-name: Required files present
          command: pytest tests/test_structure.py::test_required_files_exist -v
          timeout: 5
          max-score: 5

      - name: commands.js not empty
        id: test_commands_js
        uses: education/autograding-command-grader@v1
        with:
          test-name: commands.js not empty
          command: pytest tests/test_structure.py::test_commands_js_not_empty -v
          timeout: 5
          max-score: 1

      - name: schema.cql not empty
        id: test_schema_cql
        uses: education/autograding-command-grader@v1
        with:
          test-name: schema.cql not empty
          command: pytest tests/test_structure.py::test_schema_cql_not_empty -v
          timeout: 5
          max-score: 1

      - name: README has run instructions
        id: test_readme
        uses: education/autograding-command-grader@v1
        with:
          test-name: README has run instructions
          command: pytest tests/test_structure.py::test_readme_has_run_instructions -v
          timeout: 5
          max-score: 1

      - name: DESIGN_RATIONALE filled in
        id: test_design_rationale
        uses: education/autograding-command-grader@v1
        with:
          test-name: DESIGN_RATIONALE filled in
          command: pytest tests/test_structure.py::test_design_rationale -v
          timeout: 5
          max-score: 1

      - name: tradeoffs.md min length
        id: test_tradeoffs_length
        uses: education/autograding-command-grader@v1
        with:
          test-name: tradeoffs.md min length
          command: pytest tests/test_structure.py::test_tradeoffs_min_length -v
          timeout: 5
          max-score: 1

      - name: tradeoffs.md covers all 5 topics
        id: test_tradeoffs_topics
        uses: education/autograding-command-grader@v1
        with:
          test-name: tradeoffs.md covers all 5 topics
          command: >
            pytest
            tests/test_structure.py::test_tradeoffs_topic_cap
            tests/test_structure.py::test_tradeoffs_topic_schema_design
            tests/test_structure.py::test_tradeoffs_topic_query_flexibility
            tests/test_structure.py::test_tradeoffs_topic_write_performance
            tests/test_structure.py::test_tradeoffs_topic_when_to_use
            -v
          timeout: 5
          max-score: 2

      - name: CONSISTENCY QUORUM in CQL
        id: test_consistency_quorum
        uses: education/autograding-command-grader@v1
        with:
          test-name: CONSISTENCY QUORUM in CQL
          command: pytest tests/test_structure.py::test_consistency_quorum -v
          timeout: 5
          max-score: 2

      - name: sample_outputs.json is real output
        id: test_sample_outputs
        uses: education/autograding-command-grader@v1
        with:
          test-name: sample_outputs.json is real output
          command: pytest tests/test_structure.py::test_sample_outputs -v
          timeout: 5
          max-score: 2

      # ── MongoDB tests ───────────────────────────────────────────────────────

      - name: MongoDB collections exist
        id: test_collections_exist
        uses: education/autograding-command-grader@v1
        with:
          test-name: MongoDB collections exist
          command: pytest tests/test_mongo.py::test_collections_exist -v
          timeout: 5
          max-score: 3

      - name: Orders use embedded items
        id: test_orders_embedded
        uses: education/autograding-command-grader@v1
        with:
          test-name: Orders use embedded items
          command: pytest tests/test_mongo.py::test_orders_embedded_items -v
          timeout: 5
          max-score: 3

      - name: Orders use user_id reference
        id: test_orders_user_ref
        uses: education/autograding-command-grader@v1
        with:
          test-name: Orders use user_id reference
          command: pytest tests/test_mongo.py::test_orders_user_id_ref -v
          timeout: 5
          max-score: 2

      - name: Revenue by category aggregation
        id: test_revenue_agg
        uses: education/autograding-command-grader@v1
        with:
          test-name: Revenue by category aggregation
          command: pytest tests/test_mongo.py::test_revenue_category_agg -v
          timeout: 5
          max-score: 4

      - name: Top products per category aggregation
        id: test_top_products
        uses: education/autograding-command-grader@v1
        with:
          test-name: Top products per category aggregation
          command: pytest tests/test_mongo.py::test_top_products_agg -v
          timeout: 5
          max-score: 4

      - name: Clicks query sorted descending
        id: test_clicks_query
        uses: education/autograding-command-grader@v1
        with:
          test-name: Clicks query sorted descending
          command: pytest tests/test_mongo.py::test_clicks_query -v
          timeout: 5
          max-score: 2

      - name: MongoDB indexes exist
        id: test_indexes
        uses: education/autograding-command-grader@v1
        with:
          test-name: MongoDB indexes exist
          command: >
            pytest
            tests/test_mongo.py::test_indexes_exist
            tests/test_mongo.py::test_orders_index_covers_order_date
            tests/test_mongo.py::test_clicks_index_covers_user_ts
            -v
          timeout: 5
          max-score: 3

      # ── Cassandra tests ─────────────────────────────────────────────────────

      - name: Keyspace ecommerce exists
        id: test_keyspace_exists
        uses: education/autograding-command-grader@v1
        with:
          test-name: Keyspace ecommerce exists
          command: pytest tests/test_cassandra.py::test_keyspace_exists -v
          timeout: 5
          max-score: 2

      - name: Keyspace replication factor 3
        id: test_keyspace_rf
        uses: education/autograding-command-grader@v1
        with:
          test-name: Keyspace replication factor 3
          command: pytest tests/test_cassandra.py::test_keyspace_replication -v
          timeout: 5
          max-score: 2

      - name: orders_by_user_date table exists
        id: test_orders_table
        uses: education/autograding-command-grader@v1
        with:
          test-name: orders_by_user_date table exists
          command: pytest tests/test_cassandra.py::test_orders_table_exists -v
          timeout: 5
          max-score: 1

      - name: orders_by_user_date partition key correct
        id: test_orders_pk
        uses: education/autograding-command-grader@v1
        with:
          test-name: orders_by_user_date partition key correct
          command: >
            pytest
            tests/test_cassandra.py::test_orders_partition_key
            tests/test_cassandra.py::test_revenue_partition_key
            -v
          timeout: 5
          max-score: 3

      - name: revenue_by_category_date table exists
        id: test_revenue_table
        uses: education/autograding-command-grader@v1
        with:
          test-name: revenue_by_category_date table exists
          command: pytest tests/test_cassandra.py::test_revenue_table_exists -v
          timeout: 5
          max-score: 1

      - name: clicks_by_user table exists
        id: test_clicks_table
        uses: education/autograding-command-grader@v1
        with:
          test-name: clicks_by_user table exists
          command: pytest tests/test_cassandra.py::test_clicks_table_exists -v
          timeout: 5
          max-score: 1

      - name: clicks_by_user partition key correct
        id: test_clicks_pk
        uses: education/autograding-command-grader@v1
        with:
          test-name: clicks_by_user partition key correct
          command: pytest tests/test_cassandra.py::test_clicks_partition_key -v
          timeout: 5
          max-score: 3

      - name: Cassandra tables have data
        id: test_cassandra_data
        uses: education/autograding-command-grader@v1
        with:
          test-name: Cassandra tables have data
          command: >
            pytest
            tests/test_cassandra.py::test_orders_has_data
            tests/test_cassandra.py::test_revenue_has_data
            tests/test_cassandra.py::test_clicks_has_data
            -v
          timeout: 5
          max-score: 3

      - name: Query orders by partition key
        id: test_query_orders
        uses: education/autograding-command-grader@v1
        with:
          test-name: Query orders by partition key
          command: pytest tests/test_cassandra.py::test_query_orders_partition -v
          timeout: 5
          max-score: 3

      - name: Query clicks with LIMIT 10
        id: test_query_clicks
        uses: education/autograding-command-grader@v1
        with:
          test-name: Query clicks with LIMIT 10
          command: pytest tests/test_cassandra.py::test_query_clicks_limit -v
          timeout: 5
          max-score: 3

      # ── Report to GitHub Classroom ──────────────────────────────────────────

      - name: Autograding Reporter
        id: autograding_reporter
        uses: education/autograding-grading-reporter@v1
        env:
          TEST_REQUIRED_FILES_RESULTS: "${{ steps.test_required_files.outputs.result }}"
          TEST_COMMANDS_JS_RESULTS: "${{ steps.test_commands_js.outputs.result }}"
          TEST_SCHEMA_CQL_RESULTS: "${{ steps.test_schema_cql.outputs.result }}"
          TEST_README_RESULTS: "${{ steps.test_readme.outputs.result }}"
          TEST_DESIGN_RATIONALE_RESULTS: "${{ steps.test_design_rationale.outputs.result }}"
          TEST_TRADEOFFS_LENGTH_RESULTS: "${{ steps.test_tradeoffs_length.outputs.result }}"
          TEST_TRADEOFFS_TOPICS_RESULTS: "${{ steps.test_tradeoffs_topics.outputs.result }}"
          TEST_CONSISTENCY_QUORUM_RESULTS: "${{ steps.test_consistency_quorum.outputs.result }}"
          TEST_SAMPLE_OUTPUTS_RESULTS: "${{ steps.test_sample_outputs.outputs.result }}"
          TEST_COLLECTIONS_EXIST_RESULTS: "${{ steps.test_collections_exist.outputs.result }}"
          TEST_ORDERS_EMBEDDED_RESULTS: "${{ steps.test_orders_embedded.outputs.result }}"
          TEST_ORDERS_USER_REF_RESULTS: "${{ steps.test_orders_user_ref.outputs.result }}"
          TEST_REVENUE_AGG_RESULTS: "${{ steps.test_revenue_agg.outputs.result }}"
          TEST_TOP_PRODUCTS_RESULTS: "${{ steps.test_top_products.outputs.result }}"
          TEST_CLICKS_QUERY_RESULTS: "${{ steps.test_clicks_query.outputs.result }}"
          TEST_INDEXES_RESULTS: "${{ steps.test_indexes.outputs.result }}"
          TEST_KEYSPACE_EXISTS_RESULTS: "${{ steps.test_keyspace_exists.outputs.result }}"
          TEST_KEYSPACE_RF_RESULTS: "${{ steps.test_keyspace_rf.outputs.result }}"
          TEST_ORDERS_TABLE_RESULTS: "${{ steps.test_orders_table.outputs.result }}"
          TEST_ORDERS_PK_RESULTS: "${{ steps.test_orders_pk.outputs.result }}"
          TEST_REVENUE_TABLE_RESULTS: "${{ steps.test_revenue_table.outputs.result }}"
          TEST_CLICKS_TABLE_RESULTS: "${{ steps.test_clicks_table.outputs.result }}"
          TEST_CLICKS_PK_RESULTS: "${{ steps.test_clicks_pk.outputs.result }}"
          TEST_CASSANDRA_DATA_RESULTS: "${{ steps.test_cassandra_data.outputs.result }}"
          TEST_QUERY_ORDERS_RESULTS: "${{ steps.test_query_orders.outputs.result }}"
          TEST_QUERY_CLICKS_RESULTS: "${{ steps.test_query_clicks.outputs.result }}"
        with:
          runners: >-
            test_required_files,
            test_commands_js,
            test_schema_cql,
            test_readme,
            test_design_rationale,
            test_tradeoffs_length,
            test_tradeoffs_topics,
            test_consistency_quorum,
            test_sample_outputs,
            test_collections_exist,
            test_orders_embedded,
            test_orders_user_ref,
            test_revenue_agg,
            test_top_products,
            test_clicks_query,
            test_indexes,
            test_keyspace_exists,
            test_keyspace_rf,
            test_orders_table,
            test_orders_pk,
            test_revenue_table,
            test_clicks_table,
            test_clicks_pk,
            test_cassandra_data,
            test_query_orders,
            test_query_clicks
